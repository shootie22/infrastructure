services:
  website:
    image: git.radunenu.com/radu/radunenu.com-minimal:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RADUNENU_HOST_PORT}:1310"
    volumes:
      - type: bind
        source: ${RADUNENU_DEPLOY_DIR}/live
        target: /srv/live
        bind:
          create_host_path: true

  stats-updater:
    image: git.radunenu.com/radu/radunenu.com-minimal-stats-updater:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - runtime.env
    volumes:
      - type: bind
        source: ${RADUNENU_DEPLOY_DIR}/live
        target: /data
        bind:
          create_host_path: true
