services:

  plantuml:
    image: plantuml/plantuml-server:jetty
    container_name: ${PLANTUML_NAME}
    restart: unless-stopped

    networks:
      - internal

    expose:
      - "${PLANTUML_PORT}"

    security_opt:
      - no-new-privileges:true


  frpc:
    image: ghcr.io/fatedier/frpc:v0.65.0
    command:
      - -c
      - /etc/frp/frpc.toml
    container_name: frpc-${PLANTUML_NAME}
    restart: unless-stopped

    depends_on:
      - plantuml

    volumes:
      - ../../../utils/frp/frpc/frpc-http.toml:/etc/frp/frpc.toml:ro

    env_file:
      - runtime.env

    networks:
      - internal
      - outbound

    read_only: true
    security_opt:
      - no-new-privileges:true


networks:

  internal:
    driver: bridge
    internal: true

  outbound:
    driver: bridge
