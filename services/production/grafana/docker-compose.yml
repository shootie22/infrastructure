services:
  node-exporter:
    image: ${NODE_EXPORTER_IMAGE}:${NODE_EXPORTER_TAG}
    container_name: ${NODE_EXPORTER_CONTAINER_NAME}
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  prometheus:
    image: ${PROMETHEUS_IMAGE}:${PROMETHEUS_TAG}
    container_name: ${PROMETHEUS_CONTAINER_NAME}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --web.listen-address=0.0.0.0:9090
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT}:9090"
    volumes:
      - ${PROMETHEUS_DATA_DIR}:/prometheus
    configs:
      - source: prometheus-config
        target: /etc/prometheus/prometheus.yml

  grafana:
    image: ${GRAFANA_IMAGE}:${GRAFANA_TAG}
    container_name: ${GRAFANA_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      - node-exporter
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_SERVER_ENFORCE_DOMAIN: "true"
      GF_LOG_MODE: console
      GF_LOG_LEVEL: ${GRAFANA_LOG_LEVEL}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_AUTH_GENERIC_OAUTH_ENABLED: ${GRAFANA_ENABLE_OIDC}
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email roles
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: ${KEYCLOAK_ISSUER_URL}/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: ${KEYCLOAK_ISSUER_URL}/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: ${KEYCLOAK_ISSUER_URL}/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: full_name
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(realm_access.roles[*], 'grafana-admin') && 'Admin' || contains(realm_access.roles[*], 'grafana-editor') && 'Editor' || 'Viewer'"
      GF_METRICS_ENABLED: "true"
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT}:3000"
    volumes:
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
    configs:
      - source: grafana-prometheus-datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml

configs:
  prometheus-config:
    file: ./prometheus/prometheus.yml
  grafana-prometheus-datasource:
    file: ./grafana/provisioning/datasources/prometheus.yml
