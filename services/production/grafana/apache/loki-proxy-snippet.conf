# Include these rules in the real mon.radunenu.com vhost that terminates TLS.
# Place them before any catch-all ProxyPass / rule.
# Remote promtail agents push to https://mon.radunenu.com/loki/api/v1/push.
# Restrict this path in Apache before exposing it beyond your trusted hosts.

ProxyPass /loki/ http://127.0.0.1:3100/loki/
ProxyPassReverse /loki/ http://127.0.0.1:3100/loki/
