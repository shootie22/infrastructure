<VirtualHost *:80>
    ServerName mon.radunenu.com

    ProxyPreserveHost On
    ProxyRequests Off

    # Grafana Live uses websockets on /api/live/.
    ProxyPass /api/live/ ws://127.0.0.1:3040/api/live/
    ProxyPassReverse /api/live/ ws://127.0.0.1:3040/api/live/

    ProxyPass / http://127.0.0.1:3040/
    ProxyPassReverse / http://127.0.0.1:3040/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ErrorLog ${APACHE_LOG_DIR}/mon.radunenu.com-error.log
    CustomLog ${APACHE_LOG_DIR}/mon.radunenu.com-access.log combined
</VirtualHost>
