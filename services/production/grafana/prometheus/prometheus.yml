global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000

  - job_name: node-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/linux-node-exporters.yml

  - job_name: cadvisor
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/cadvisor.yml

  - job_name: http-servers
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/http-services.yml
