services:

  exporter:
    build: ./app
    container_name: ${LIVEKIT_QUALITY_NAME}
    restart: unless-stopped

    # Host networking so the probe reaches LiveKit's RoomService/signalling
    # directly on the Hetzner loopback. Going via the public URL routes through
    # the edge Apache proxy, which only fronts the WebSocket path and returns
    # 405 for the RoomService Twirp POST. Mirrors the livekit-metrics stack.
    network_mode: host

    environment:
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      PROBE_IDENTITY: ${PROBE_IDENTITY}
      POLL_INTERVAL: ${POLL_INTERVAL}
      LISTEN_ADDR: ${LISTEN_ADDR}

    read_only: true
    security_opt:
      - no-new-privileges:true

  frpc:
    image: ghcr.io/fatedier/frpc:v0.65.0
    command:
      - -c
      - /etc/frp/frpc.toml
    container_name: frpc-livekit-quality
    restart: unless-stopped

    depends_on:
      - exporter

    # Host networking to reach the exporter on 127.0.0.1:6790 (same as
    # livekit-metrics' frpc).
    network_mode: host

    volumes:
      - ../../../utils/frp/frpc/frpc-tcp.toml:/etc/frp/frpc.toml:ro

    env_file:
      - runtime.env

    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
