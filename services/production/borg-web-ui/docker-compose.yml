services:
  borg-ui:
    image: ainullcode/borg-ui:latest
    container_name: borg-web-ui
    restart: unless-stopped
    ports:
      - "${BORG_WEB_UI_HOST_PORT}:8081"
    volumes:
      - ${BORG_WEB_UI_ROOT}/data:/data
      - ${BORG_WEB_UI_ROOT}/cache:/home/borg/.cache/borg
      - ${BORG_WEB_UI_LOCAL_DIR}:/local:ro
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    # Optional: Remove these 3 lines if you don't want Redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - borg_network

  # Optional: Redis speeds up archive browsing 600x
  # Remove this entire section if you don't need it
  redis:
    image: redis:7-alpine
    container_name: borg-redis
    restart: unless-stopped
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - borg_network

networks:
  borg_network:

volumes:
  borg_data:
  borg_cache:
