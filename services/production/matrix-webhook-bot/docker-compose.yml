services:
  matrix-webhook-bot:
    image: git.radunenu.com/radu/matrix-webhook-bot:${MATRIX_WEBHOOK_BOT_IMAGE_TAG}
    pull_policy: always
    container_name: matrix-webhook-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MATRIX_WEBHOOK_BOT_HOST_PORT}:8080"
    environment:
      LISTEN_ADDR: ":8080"
      MAX_BODY_SIZE: "${MATRIX_WEBHOOK_BOT_MAX_BODY_SIZE}"
      ROUTES_FILE: /config/routes.yaml
      DEBUG_ENABLED: "${MATRIX_WEBHOOK_BOT_DEBUG_ENABLED}"
      MATRIX_HOMESERVER_URL: "${MATRIX_WEBHOOK_BOT_HOMESERVER_URL}"
      MATRIX_BOT_USER_ID: "${MATRIX_WEBHOOK_BOT_BOT_USER_ID}"
      MATRIX_ACCESS_TOKEN: "${MATRIX_WEBHOOK_BOT_ACCESS_TOKEN}"
      WEBHOOK_BEARER_TOKEN: "${MATRIX_WEBHOOK_BOT_WEBHOOK_BEARER_TOKEN}"
    volumes:
      - ./routes.yaml:/config/routes.yaml:ro
    networks:
      - monitoring_net

networks:
  monitoring_net:
    external: true
    name: monitoring_net
