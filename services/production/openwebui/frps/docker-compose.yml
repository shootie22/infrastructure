services:

  frps:
    image: snowdreamtech/frps
    container_name: ${FRPS_NAME}
    restart: unless-stopped

    ports:
      - "${FRP_BIND_PORT}:${FRP_BIND_PORT}/tcp"
      - "127.0.0.1:${FRP_VHOST_HTTP_PORT}:${FRP_VHOST_HTTP_PORT}/tcp"
      - "127.0.0.1:${FRP_VHOST_HTTPS_PORT}:${FRP_VHOST_HTTPS_PORT}/tcp"

    volumes:
      - ../../../utils/frp/frps/frps.toml:/etc/frp/frps.toml:ro
      - ../../../utils/frp/frps/res:/etc/frp/res:ro

    env_file:
      - runtime.env

    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
