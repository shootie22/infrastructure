services:
  kronorite-server:
    image: git.radunenu.com/radu/kronorite-dedicated-server:latest
    platform: linux/amd64
    pull_policy: always
    restart: unless-stopped
    environment:
      SERVER_PORT: ${SERVER_PORT:-7777}
      QUERY_PORT: ${QUERY_PORT:-7780}
      SERVER_SETTINGS: ${SERVER_SETTINGS:-EU-CLS#1}

  frpc:
    image: snowdreamtech/frpc
    restart: unless-stopped
    depends_on:
      - kronorite-server
    volumes:
      - ../../../utils/frp/frpc/frpc-udp.toml:/etc/frp/frpc.toml:ro
    env_file:
      - runtime.env
    read_only: true
    security_opt:
      - no-new-privileges:true
