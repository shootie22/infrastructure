services:

  frps:
    image: ghcr.io/fatedier/frps:v0.65.0
    container_name: ${FRPS_NAME}
    restart: unless-stopped

    ports:
      # FRP control traffic uses TCP by default.
      - "${FRP_BIND_PORT}:${FRP_BIND_PORT}/tcp"
      # Exposes the UDP proxy ports configured on the matching frpc side.
      - "${FRP_REMOTE_PORT_RANGE}:${FRP_REMOTE_PORT_RANGE}/udp"

    volumes:
      - ../../../utils/frp/frps/frps.toml:/etc/frp/frps.toml:ro
      - ../../../utils/frp/frps/res:/etc/frp/res:ro

    env_file:
      - runtime.env

    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
