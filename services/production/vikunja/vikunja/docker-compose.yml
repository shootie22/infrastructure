services:
  vikunja:
    image: vikunja/vikunja:2.1.0
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL}
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_SERVICE_JWTSECRET}
      VIKUNJA_DATABASE_HOST: ${VIKUNJA_DATABASE_HOST}
      VIKUNJA_DATABASE_PASSWORD: "${VIKUNJA_DATABASE_PASSWORD}"
      VIKUNJA_DATABASE_TYPE: ${VIKUNJA_DATABASE_TYPE}
      VIKUNJA_DATABASE_USER: ${VIKUNJA_DATABASE_USER}
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_DATABASE_DATABASE}
      VIKUNJA_MAILER_ENABLED: "${VIKUNJA_MAILER_ENABLED}"
      VIKUNJA_MAILER_HOST: "${VIKUNJA_MAILER_HOST}"
      VIKUNJA_MAILER_PORT: "${VIKUNJA_MAILER_PORT}"
      VIKUNJA_MAILER_USERNAME: "${VIKUNJA_MAILER_USERNAME}"
      VIKUNJA_MAILER_PASSWORD: "${VIKUNJA_MAILER_PASSWORD}"
      VIKUNJA_MAILER_FROMEMAIL: "${VIKUNJA_MAILER_FROMEMAIL}"
      VIKUNJA_SERVICE_ENABLEREGISTRATION: ${VIKUNJA_SERVICE_ENABLEREGISTRATION}
    ports:
      - 127.0.0.1:${VIKUNJA_HOST_PORT}:3456
    volumes:
      - ${VIKUNJA_ROOT}/files:/app/vikunja/files
      - ${VIKUNJA_ROOT}/files/config.yml:/etc/vikunja/config.yml
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks: 
      - vikunja_internal
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ${VIKUNJA_ROOT}/db:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER"]
      interval: 2s
      start_period: 30s
    networks:
      - vikunja_internal
  frpc:
    image: snowdreamtech/frpc
    container_name: frpc-vikunja
    restart: unless-stopped

    volumes:
      - ../../../utils/frp/frpc/frpc-http.toml:/etc/frp/frpc.toml:ro

    env_file:
      - runtime.env

    depends_on:
      - vikunja

    read_only: true
    security_opt:
      - no-new-privileges:true
    networks: 
      - vikunja_internal
networks:
  vikunja_internal:
    driver: bridge
