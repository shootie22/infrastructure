services:
  postgres:
    image: postgres:17.4
    container_name: ${RYBBIT_POSTGRES_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - ${RYBBIT_ROOT}/postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - rybbit_internal

  clickhouse:
    image: clickhouse/clickhouse-server:25.4.2
    container_name: ${RYBBIT_CLICKHOUSE_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}

    volumes:
      - ${RYBBIT_ROOT}/clickhouse:/var/lib/clickhouse
      - ./clickhouse/network.xml:/etc/clickhouse-server/config.d/network.xml:ro
      - ./clickhouse/enable_json.xml:/etc/clickhouse-server/config.d/enable_json.xml:ro
      - ./clickhouse/logging_rules.xml:/etc/clickhouse-server/config.d/logging_rules.xml:ro
      - ./clickhouse/user_logging.xml:/etc/clickhouse-server/config.d/user_logging.xml:ro

    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - rybbit_internal

  backend:
    container_name: ${RYBBIT_BACKEND_CONTAINER_NAME}
    restart: unless-stopped

    build:
      context: https://github.com/rybbit-io/rybbit.git#${RYBBIT_SOURCE_REF}
      dockerfile: server/Dockerfile

    environment:
      NODE_ENV: production
      CLICKHOUSE_HOST: http://clickhouse:8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BASE_URL: ${BASE_URL}
      DOMAIN_NAME: ${DOMAIN_NAME}
      DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      DISABLE_TELEMETRY: ${DISABLE_TELEMETRY}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}

    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - rybbit_internal
      - outbound

    security_opt:
      - no-new-privileges:true

  client:
    container_name: ${RYBBIT_CLIENT_CONTAINER_NAME}
    restart: unless-stopped

    build:
      context: https://github.com/rybbit-io/rybbit.git#${RYBBIT_SOURCE_REF}
      dockerfile: client/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${BASE_URL}
        NEXT_PUBLIC_DISABLE_SIGNUP: ${DISABLE_SIGNUP}

    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: ${BASE_URL}
      NEXT_PUBLIC_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      DOMAIN_NAME: ${DOMAIN_NAME}

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - rybbit_internal

    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.10.0
    container_name: ${RYBBIT_CADDY_CONTAINER_NAME}
    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy
      client:
        condition: service_started

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

    expose:
      - "8080"

    networks:
      - rybbit_internal

    security_opt:
      - no-new-privileges:true

  frpc:
    image: ghcr.io/fatedier/frpc:v0.65.0
    command:
      - -c
      - /etc/frp/frpc.toml
    container_name: frpc-${RYBBIT_CADDY_CONTAINER_NAME}
    restart: unless-stopped

    depends_on:
      caddy:
        condition: service_started

    volumes:
      - ../../../utils/frp/frpc/frpc-http.toml:/etc/frp/frpc.toml:ro

    env_file:
      - runtime.env

    networks:
      - rybbit_internal
      - outbound

    read_only: true
    security_opt:
      - no-new-privileges:true

networks:
  rybbit_internal:
    driver: bridge
    internal: true

  outbound:
    driver: bridge
