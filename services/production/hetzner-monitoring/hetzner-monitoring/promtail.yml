server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yml

clients:
  - url: https://mon.radunenu.com/loki/api/v1/push
    basic_auth:
      username: "${LOKI_PUSH_USERNAME}"
      password: "${LOKI_PUSH_PASSWORD}"

scrape_configs:
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: hetzner
          __path__: /var/log/auth.log

  - job_name: nginx_access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx_access
          host: hetzner
          __path__: /var/log/nginx/*access.log

  - job_name: nginx_error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx_error
          host: hetzner
          __path__: /var/log/nginx/*error.log

  - job_name: livekit
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/element-call-livekit'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - target_label: host
        replacement: hetzner
      - target_label: job
        replacement: livekit
    pipeline_stages:
      # Parse LiveKit's JSON log line. `level` stays a label (low cardinality).
      # participant/room/pID/reason are high cardinality, so they ride as
      # structured metadata (filterable in Grafana, queryable via `| json`)
      # rather than labels, to avoid exploding Loki's stream count.
      # NOTE: confirm these key names against real logs first — see
      # services/production/livekit-quality/README.md "Discovery". `reason` is
      # already known-good (the dashboard's Disconnect Reasons panel uses it).
      - json:
          expressions:
            level: level
            participant: participant
            room: room
            pid: pID
            reason: reason
      - labels:
          level:
      - structured_metadata:
          participant:
          room:
          pid:
          reason:
      # Optional ingest guard for a debug-level window (used to capture the
      # selected ICE candidate pair + client media IP). promtail's drop stage
      # drops on match, so match the *noise*, not the signal: this drops only
      # debug stats/keepalive chatter while keeping ICE/candidate/disconnect
      # lines. Uncomment while LiveKit runs at `log_level: debug`.
      # - match:
      #     selector: '{job="livekit", level="debug"}'
      #     stages:
      #       - drop:
      #           expression: "(?i)(stats|keepalive|periodic report)"
      #           drop_counter_reason: livekit_debug_noise
