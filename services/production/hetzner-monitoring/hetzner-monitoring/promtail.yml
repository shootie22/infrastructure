server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yml

clients:
  - url: https://mon.radunenu.com/loki/api/v1/push
    basic_auth:
      username: "${LOKI_PUSH_USERNAME}"
      password: "${LOKI_PUSH_PASSWORD}"

scrape_configs:
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: hetzner
          __path__: /var/log/auth.log

  - job_name: nginx_access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx_access
          host: hetzner
          __path__: /var/log/nginx/*access.log

  - job_name: nginx_error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx_error
          host: hetzner
          __path__: /var/log/nginx/*error.log

  - job_name: livekit
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/element-call-livekit'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - target_label: host
        replacement: hetzner
      - target_label: job
        replacement: livekit
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
      - labels:
          level:
