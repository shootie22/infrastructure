<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="darkreader-lock">
    <meta name="color-scheme" content="light dark">
    <title>503 Service temporarily unavailable.</title>
    <style>
        :root {
            --page-bg: #eceae4;
            --sheet-bg: rgba(255, 255, 255, 0.84);
            --text-color: #111111;
            --muted-text: #333333;
            --rule-color: rgba(0, 0, 0, 0.2);
            --sheet-border: rgba(255, 255, 255, 0.45);
            --sheet-shadow: 0 18px 44px rgba(0, 0, 0, 0.22);
            --link-color: #3c5f50;
            --font-body: "Segoe UI", Arial, sans-serif;
            --font-display: Georgia, serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #171717;
                --sheet-bg: rgba(24, 24, 24, 0.78);
                --text-color: #efefef;
                --muted-text: #c8c8c8;
                --rule-color: rgba(255, 255, 255, 0.25);
                --sheet-border: rgba(255, 255, 255, 0.22);
                --sheet-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
                --link-color: #72c3a0;
            }
        }

        html {
            color-scheme: light dark;
            font-size: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 2rem 1rem;
            background-color: var(--page-bg);
            background-image: url("https://radunenu.com/assets/img/backgrounds/wallhaven-je1row.webp");
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: var(--font-body);
            line-height: 1.72;
        }

        main {
            width: min(100%, 50rem);
            margin: 0 auto;
            padding: 2rem;
            background: var(--sheet-bg);
            border: 1px solid var(--sheet-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--sheet-shadow);
        }

        h1 {
            margin: 0 0 0.7rem;
            font-family: var(--font-display);
            font-size: 1.72rem;
            font-weight: 600;
            line-height: 1.2;
        }

        p {
            margin: 0 0 1rem;
            font-size: 0.9rem;
        }

        a {
            color: var(--link-color);
        }

        .error-code {
            margin-bottom: 0.2rem;
            color: var(--muted-text);
            font-size: 0.84rem;
        }

        .button-row {
            margin-top: 1.15rem;
            margin-bottom: 0;
        }

        .button-link {
            display: inline-block;
            padding: 0.5rem 0.85rem;
            border: 1px solid var(--sheet-border);
            text-decoration: none;
        }

        .button-link:hover {
            border-color: currentColor;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <article>
            <p class="error-code">503</p>
            <h1>Service temporarily unavailable.</h1>
            <p>This service is temporarily unavailable right now.</p>
            <p>If this keeps happening, check the <a href="https://radunenu.com/status/">status page</a>.</p>
            <p class="button-row"><a class="button-link" href="https://radunenu.com/">Back to home</a></p>
        </article>
    </main>
</body>
</html>
