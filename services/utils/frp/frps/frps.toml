# -------------------------
# Bind Settings
# -------------------------

bindAddr = "0.0.0.0"
bindPort = {{ .Envs.FRP_BIND_PORT }}

# Optional QUIC support
quicBindPort = {{ .Envs.FRP_QUIC_PORT }}

# -------------------------
# Authentication
# -------------------------

auth.method = "token"
auth.token = "{{ .Envs.FRP_TOKEN }}"

# -------------------------
# TLS Settings
# -------------------------

transport.tls.enable = {{ .Envs.FRP_TLS_ENABLE }}

transport.tls.certFile = "{{ .Envs.FRP_TLS_CERT }}"
transport.tls.keyFile = "{{ .Envs.FRP_TLS_KEY }}"
transport.tls.trustedCaFile = "{{ .Envs.FRP_TLS_CA }}"

# -------------------------
# Dashboard
# -------------------------

webServer.addr = "0.0.0.0"
webServer.port = {{ .Envs.FRP_DASHBOARD_PORT }}

webServer.user = "{{ .Envs.FRP_DASHBOARD_USER }}"
webServer.password = "{{ .Envs.FRP_DASHBOARD_PASS }}"

# -------------------------
# Logging
# -------------------------

log.to = "console"
log.level = "{{ .Envs.FRP_LOG_LEVEL }}"
log.maxDays = 7

# -------------------------
# Limits / Security
# -------------------------

maxPortsPerClient = {{ .Envs.FRP_MAX_PORTS }}

# Optional allowlist
allowPorts = [
  {{ .Envs.FRP_ALLOWED_PORTS }}
]
